<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EO-Dashboard — المكتب التنفيذي | سنكري القابضة</title>
<link rel="icon" type="image/png" href="/assets/logo-mark.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
</head>
<body>
<header>
  <div class="logo" aria-label="سنكري القابضة">
    <img src="/assets/logo-horizontal.png" alt="سنكري القابضة — SANKARI HOLDING">
  </div>
  <div class="title">
    <h1>لوحة المكتب التنفيذي</h1>
    <p>مجموعة سنكري القابضة — متابعة المهام والمخرجات</p>
  </div>
  <div class="header-actions">
    <span class="sync" id="sync">—</span>
    <div class="bell-wrap">
      <button class="btn btn-ghost bell" id="bellBtn">🔔<span class="bell-count" id="bellCount" style="display:none">0</span></button>
      <div class="bell-panel" id="bellPanel"></div>
    </div>
    <button class="btn btn-ghost" id="addBtn" style="display:none">➕ مهمة جديدة</button>
    <button class="btn btn-gold" id="refreshBtn">🔄 تحديث</button>
    <button class="btn btn-ghost" id="pushBtn" title="تفعيل إشعارات المتصفح" style="display:none">🔕</button>
    <a class="btn btn-ghost" id="usersBtn" href="/users.html" style="display:none">👥 المستخدمون</a>
    <span class="user-chip" id="userChip" style="display:none"></span>
    <button class="btn btn-ghost" id="logoutBtn" style="display:none">خروج</button>
  </div>
</header>

<main>
  <section class="kpis" id="kpis"></section>

  <div class="toolbar">
    <div class="chips" id="timeChips"></div>
    <div class="filters">
      <select id="fProject"><option value="">كل المشاريع</option></select>
      <select id="fOwner"><option value="">كل المسؤولين</option></select>
      <select id="fPriority"><option value="">كل الأولويات</option></select>
      <select id="fStatus"><option value="">كل الحالات</option></select>
      <input class="search" id="fSearch" type="text" placeholder="🔍 بحث في المهام...">
      <button class="btn btn-ghost reset" id="resetBtn" style="background:#eef0f3;color:var(--navy)">مسح الفلاتر</button>
    </div>
  </div>

  <div class="views">
    <button class="view-tab active" data-view="table">📋 جدول</button>
    <button class="view-tab" data-view="kanban">🗂️ كانبان</button>
    <button class="view-tab" data-view="calendar">🗓️ تقويم</button>
  </div>

  <div class="count-line" id="countLine"></div>

  <div id="viewArea">
    <div class="spinner">جارٍ تحميل المهام…</div>
  </div>
</main>

<div class="modal-back" id="modalBack">
  <div class="modal">
    <div class="modal-head">
      <h3 id="mTitle">تفاصيل المهمة</h3>
      <button class="modal-close" id="mClose">✕</button>
    </div>
    <div class="modal-body" id="mBody"></div>
    <div class="modal-foot" id="mFoot"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<script src="/app.js"></script>
</body>
</html>
