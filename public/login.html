<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول — EO-Dashboard</title>
<link rel="icon" type="image/png" href="/assets/logo-mark.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Tajawal:wght@400;500;700;800&family=Almarai:wght@400;700;800&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Readex+Pro:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=Sora:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css?v=33">
<script>
/* تطبيق التصميم/الوضع/الخط المحفوظ فوراً (قبل الرسم) لتوافق شاشة الدخول مع اختيار المستخدم */
(function () { try {
  var R = document.documentElement, LS = localStorage, DES = ['classic', 'wing', 'bp', 'marsad', 'horizon', 'pearl', 'custom'], BASE = DES.slice(0, 6);
  var d = LS.getItem('eo_design'); if (DES.indexOf(d) < 0) d = 'classic';
  var m = LS.getItem('eo_theme') === 'dark' ? 'dark' : 'light';
  var g = LS.getItem('eo_glass') === '1' ? 'on' : 'off';
  var c = {}; try { c = JSON.parse(LS.getItem('eo_custom') || '{}') || {}; } catch (e) { c = {}; }
  var sig = d === 'custom' ? (BASE.indexOf(c.shape) >= 0 ? c.shape : 'wing') : d;
  var bar = d === 'custom' ? (BASE.indexOf(c.topbar) >= 0 ? c.topbar : 'wing') : d;
  var DEFA = { classic: 'sankari', wing: 'sankari', bp: 'sankari', marsad: 'sankari', horizon: 'teal', pearl: 'sankari' };
  var acc = LS.getItem('eo_accent'); if (acc !== 'teal' && acc !== 'sankari') acc = (d === 'custom' ? '' : DEFA[d]);
  var wmOn = d === 'wing' || (d === 'custom' && c.ambient === 'wing');
  R.setAttribute('data-style', d); R.setAttribute('data-theme', m); R.setAttribute('data-glass', g);
  R.setAttribute('data-sig', sig); R.setAttribute('data-bar', bar);
  R.setAttribute('data-rail', LS.getItem('eo_rail') === 'wide' ? 'wide' : 'narrow');
  if (acc) R.setAttribute('data-accent', acc);
  R.setAttribute('data-wm', wmOn ? 'on' : 'off');
  try { var w = JSON.parse(LS.getItem('eo_wm') || '{}') || {}; if (wmOn) { if (w.top) R.setAttribute('data-wm-top', '1'); if (w.size != null) R.style.setProperty('--wm-size', w.size + '% auto'); if (w.op != null) R.style.setProperty('--wm-opacity', String(w.op / 100)); if (w.dark != null) R.style.setProperty('--wm-bright', String((100 - w.dark) / 100)); } } catch (e) {}
  var FA = { cairo: "'Cairo', system-ui, 'Segoe UI', sans-serif", tajawal: "'Tajawal', 'Cairo', system-ui, sans-serif", almarai: "'Almarai', 'Cairo', system-ui, sans-serif", plexar: "'IBM Plex Sans Arabic', 'Cairo', system-ui, sans-serif", readex: "'Readex Pro', 'Cairo', system-ui, sans-serif" };
  var FLn = { ibmplex: "'IBM Plex Sans', system-ui, sans-serif", sora: "'Sora', system-ui, sans-serif", space: "'Space Grotesk', system-ui, sans-serif", manrope: "'Manrope', system-ui, sans-serif", mono: "'IBM Plex Mono', ui-monospace, monospace" };
  var fa = LS.getItem('eo_font_ar'), fl = LS.getItem('eo_font_latin');
  if (FA[fa]) R.style.setProperty('--font-ar', FA[fa]);
  if (FLn[fl]) R.style.setProperty('--font-latin', FLn[fl]);
} catch (e) {} })();
</script>
<style>
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #211d1a 0%, #322c26 100%); padding: 20px; }
  .login-card { background: #fff; border-radius: 18px; box-shadow: 0 24px 60px rgba(0,0,0,.4); width: 100%; max-width: 390px; overflow: hidden; }
  .login-top { background: linear-gradient(135deg, #211d1a, #322c26); border-bottom: 3px solid var(--copper); padding: 30px 30px 24px; text-align: center; }
  .login-logo { width: 116px; height: auto; margin: 0 auto 14px; display: block; }
  .login-top h1 { font-size: 20px; color: #fff; margin-bottom: 4px; font-weight: 800; }
  .login-top p { color: var(--champagne); font-size: 13px; font-weight: 600; }
  .login-body { padding: 28px 30px 32px; }
  .login-card label { display: block; font-size: 13px; font-weight: 700; color: var(--navy); margin-bottom: 6px; }
  /* البطاقة مفصولة عن الوضع الداكن (مثبّتة فاتحة) — لذا ألوان الحقول هاردكود + color-scheme فاتح */
  .login-card { color-scheme: light; }
  .login-card input { width: 100%; padding: 11px 13px; border: 1px solid #e7ddcf; border-radius: 10px; font-family: inherit; font-size: 14px; margin-bottom: 16px; color: #2b2823; background: #fff; }
  .login-card input:focus { outline: none; border-color: var(--copper); box-shadow: 0 0 0 3px rgba(189,106,67,.14); }
  .login-card button { width: 100%; padding: 12px; background: var(--copper); color: #fff; border: none; border-radius: 10px; font-family: inherit; font-size: 15px; font-weight: 800; cursor: pointer; transition: .15s; }
  .login-card button:hover { background: var(--gold-light); }
  .login-err { background: var(--red-bg); color: var(--red); padding: 10px; border-radius: 9px; font-size: 13px; font-weight: 700; text-align: center; margin-bottom: 16px; display: none; }
</style>
</head>
<body>
<form class="login-card" id="loginForm">
  <div class="login-top">
    <img class="login-logo" src="/assets/logo-mark.png" alt="سنكري القابضة — SANKARI HOLDING">
    <h1 data-i18n="لوحة الإدارة التنفيذية">لوحة الإدارة التنفيذية</h1>
    <p data-i18n="مجموعة سنكري القابضة">مجموعة سنكري القابضة</p>
  </div>
  <div class="login-body" id="loginBody">
    <div class="login-err" id="err"></div>
    <label for="email" data-i18n="البريد الإلكتروني">البريد الإلكتروني</label>
    <input id="email" type="email" autocomplete="username" required>
    <label for="password" data-i18n="كلمة المرور">كلمة المرور</label>
    <div class="pw-wrap" style="margin-bottom:16px"><input id="password" type="password" autocomplete="current-password" required style="margin-bottom:0"><button type="button" class="pw-eye" data-target="password" aria-label="إظهار كلمة المرور">👁</button></div>
    <button type="submit" id="btn" data-i18n="دخول">دخول</button>
    <!-- رابط تحميل تطبيق الأندرويد — يظهر فقط عند وجود ملف APK منشور، ويختفي داخل التطبيق -->
    <a id="apkLogin" class="apk-link" href="/apk/eo-dashboard.apk" download="EO-Dashboard.apk" style="display:none">
      <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 15a7 7 0 0 1 14 0v2.2H5z"/><path d="m7.6 8.6-1.7-2.5M16.4 8.6l1.7-2.5"/><path d="M9.3 12.3h.01M14.7 12.3h.01"/><path d="M7 20.5v-3.3M17 20.5v-3.3M12 21v-3.8"/></svg>
      <span data-i18n="تحميل تطبيق الأندرويد">تحميل تطبيق الأندرويد</span>
    </a>
    <!-- شارة الإصدار: إصدار حزمة الويب + إصدار التطبيق داخل الغلاف — لتشخيص أي جهاز فوراً -->
    <div id="eoVer" style="margin-top:10px;font-size:10.5px;color:#8a8178;text-align:center;opacity:.8"></div>
  </div>
  <div class="login-body" id="chooserBody" style="display:none">
    <p style="font-weight:800;color:var(--navy);text-align:center;margin-bottom:16px" data-i18n="اختر البروفايل للدخول">اختر البروفايل للدخول</p>
    <div id="profileChoices" style="display:flex;flex-direction:column;gap:10px"></div>
  </div>
</form>
<script src="/i18n.js?v=33"></script>
<script>
// ===== تطبيق الأندرويد (الحزمة 33): رابط التحميل + الاسم الديناميكي + شارة الإصدار =====
(function () {
  // شارة الإصدار: رقم حزمة الويب من ?v= في وسم i18n.js + إصدار التطبيق من الجسر
  try {
    let t = '';
    const s = document.querySelector('script[src*="i18n.js?v="]');
    const m = s ? String(s.getAttribute('src')).match(/v=(\d+)/) : null;
    if (m) t = tr('إصدار المنصّة') + ' ' + m[1];
    if (window.AndroidBridge && window.AndroidBridge.getVersion) {
      try { const av = window.AndroidBridge.getVersion(); if (av) t += (t ? ' · ' : '') + tr('إصدار التطبيق') + ' ' + av; } catch (e) { /* جسر قديم */ }
    }
    const v = document.getElementById('eoVer'); if (v && t) v.textContent = t;
  } catch (e) { /* تجاهل */ }
  // تحذير WebView القديم داخل التطبيق (مرة واحدة — قبل الدخول)
  if (window.AndroidBridge) {
    try {
      const m2 = navigator.userAgent.match(/Chrome\/(\d+)/);
      if (m2 && Number(m2[1]) < 90 && !localStorage.getItem('eo_wv_warn')) {
        localStorage.setItem('eo_wv_warn', '1');
        alert(tr('نسخة مكوّن عرض الويب (WebView) على هذا الهاتف قديمة وقد تظهر الواجهة بشكل غير سليم — حدّث تطبيق «Android System WebView» من متجر Google Play ثم أعد فتح التطبيق.'));
      }
    } catch (e) { /* تجاهل */ }
  }
  // رابط التحميل: يظهر فقط إذا كان APK منشوراً ولسنا داخل التطبيق + إبلاغ الجسر بالاسم
  fetch('/api/app-config').then((r) => r.json()).then((cfg) => {
    const inApp = !!window.AndroidBridge;
    const a = document.getElementById('apkLogin');
    if (a && cfg && cfg.apk && !inApp) a.style.display = 'flex';
    if (inApp && window.AndroidBridge.setAppName && cfg && cfg.name) {
      try { window.AndroidBridge.setAppName(String(cfg.name)); } catch (e) { /* جسر قديم */ }
    }
  }).catch(() => { /* يبقى الرابط مخفياً */ });
})();
</script>
<script>
document.querySelectorAll('.pw-eye').forEach((b) => b.onclick = () => {
  const t = document.getElementById(b.dataset.target);
  if (t) { t.type = t.type === 'password' ? 'text' : 'password'; b.textContent = t.type === 'password' ? '👁' : '🙈'; }
});
const form = document.getElementById('loginForm');
form.onsubmit = async (e) => {
  e.preventDefault();
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');
  err.style.display = 'none';
  btn.disabled = true; btn.textContent = '... جارٍ الدخول';
  try {
    const res = await fetch('/api/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email.value, password: password.value }),
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'فشل الدخول');
    if (data.needProfile && (data.profiles || []).length > 1) {
      showChooser(data.profiles);
    } else {
      location.href = '/';
    }
  } catch (e2) {
    err.textContent = e2.message; err.style.display = 'block';
    btn.disabled = false; btn.textContent = 'دخول';
  }
};
function showChooser(profiles) {
  document.getElementById('loginBody').style.display = 'none';
  const box = document.getElementById('profileChoices');
  box.innerHTML = '';
  profiles.forEach((p) => {
    const b = document.createElement('button');
    b.type = 'button'; b.textContent = p.label || p.tab;
    b.onclick = async () => {
      b.disabled = true;
      try {
        const r = await fetch('/api/profile', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ profile: p.tab }) });
        const d = await r.json(); if (!d.ok) throw new Error(d.error);
        location.href = '/';
      } catch (e3) { b.disabled = false; alert('تعذّر: ' + e3.message); }
    };
    box.appendChild(b);
  });
  document.getElementById('chooserBody').style.display = 'block';
}
</script>
</body>
</html>
