name: نبضة التذكيرات (يدوي فقط)

# ⚠️ الجدولة الدورية أُلغيت في الحزمة 34 عمداً — لا تُعِدها.
# صار زناد Apps Script (في ملف المهام) هو المجدول الوحيد، ويحترم «جدولة النبضة»
# التي يضبطها المدير من صفحة المستخدمين (أيام + فترة + إيقاظ مسبق + تعطيل كامل).
# لو بقيت جدولة GitHub كل ٥ دقائق لبقي خادم Render مستيقظاً على الدوام
# ولضاعت غاية الميزة (توفير ساعات الاستضافة بنوم الخادم خارج فترة العمل).
# أُبقي التشغيل اليدوي (Run workflow) كأداة فحص عند الحاجة فقط.
# يتطلب السرّين: APP_URL و CRON_SECRET في إعدادات المستودع.

on:
  workflow_dispatch: {}

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: استدعاء نبضة التذكيرات
        run: |
          curl -fsS --max-time 240 -X POST "$APP_URL/api/cron/reminders" \
            -H "x-cron-secret: $CRON_SECRET" \
            -w "\nHTTP %{http_code}\n"
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
