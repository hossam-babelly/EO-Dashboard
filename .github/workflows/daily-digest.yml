name: الملخص اليومي للمهام

on:
  schedule:
    - cron: '0 5 * * *'   # 05:00 UTC = 08:00 بتوقيت دمشق
  workflow_dispatch: {}

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: استدعاء الملخص اليومي
        run: |
          echo "URL: $APP_URL/api/cron/daily-digest"
          code=$(curl -sS -o /tmp/resp.txt -w "%{http_code}" \
            -X POST "$APP_URL/api/cron/daily-digest" \
            -H "x-cron-secret: $CRON_SECRET")
          echo "=== HTTP $code ==="
          echo "=== Response ==="
          cat /tmp/resp.txt; echo
          test "$code" = "200"
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
